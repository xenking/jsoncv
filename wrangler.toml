name = "jsoncv"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Static assets configuration for editor, site, and resumes
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Route to custom domains
[[routes]]
pattern = "cv.xenking.pro"
zone_name = "xenking.pro"
custom_domain = true

[[routes]]
pattern = "cv.oliviadilan.com"
zone_name = "oliviadilan.com"
custom_domain = true

# Environment variables
[vars]
DOMAIN = "cv.xenking.pro"
RESUME_NAME = "Vladislav Tishchenko CV"
SITE_URL = "xenking.pro"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
