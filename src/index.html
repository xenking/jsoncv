<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <%- include('src/templates/meta', editorMeta) %>

  <title>JSONCV Editor</title>
  <link rel="shortcut icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="./scss/editor/index.scss" />
</head>
<body>
  <div id="main">
    <div class="sidebar column">
      <div class="logo">
        <a href="/"><span class="t-jsoncv"><span class="t-json">JSON</span>CV</span></a>
        <div style="padding: 2px 5px;">Editor</div>
      </div>
      <div class="app-actions">
        <div class="sidebar-group">
          <div class="sidebar-group__label">Settings</div>
          <label for="fn-color-picker" class="color-picker">
            <div>Primary color</div>
            <div class="color-area">
              <input type="color" id="fn-color-picker">
              <span class="value">#aaaaaa</span>
            </div>
          </label>
          <label for="fn-theme-select" class="theme-select">
            <div>Theme</div>
            <select id="fn-theme-select"></select>
          </label>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group__label">Export</div>
          <div class="sidebar-btn-row">
            <button id="fn-download-json" class="sidebar-btn" title="Download JSON">&#8595; JSON</button>
            <button id="fn-download-html" class="sidebar-btn" title="Download HTML">&#8595; HTML</button>
            <button id="fn-print-preview" class="sidebar-btn" title="Print / Save as PDF">&#128424; PDF</button>
          </div>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group__label">Data</div>
          <div class="sidebar-btn-row">
            <button id="fn-new-data" class="sidebar-btn" title="Create empty CV">+ New</button>
            <button id="fn-upload-data" class="sidebar-btn" title="Open existing JSON file">&#8593; Open</button>
            <button id="fn-load-sample" class="sidebar-btn" title="Load sample data">&#9733; Sample</button>
          </div>
          <input type="file" name="upload-data" style="display: none;">
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group__label">View</div>
          <div class="sidebar-btn-row">
            <button id="fn-toggle-preview" class="sidebar-btn">Preview / JSON</button>
          </div>
        </div>
      </div>
      <div class="editor-toc"></div>
    </div>
    <div class="middle column editor-container"></div>
    <div class="right column">
      <div class="output-json" style="display: none;">
        <div class="output-json__toolbar">
          <span class="output-json__title">JSON Preview</span>
          <button id="fn-copy-json" class="output-json__copy-btn" title="Copy JSON to clipboard">Copy</button>
        </div>
        <pre class="output-json__content code-block"></pre>
      </div>
      <iframe class="output-html" src="/preview/" frameborder="0"></iframe>
    </div>
  </div>

  <script src="./editor/main.js" type="module"></script>
</body>
</html>
